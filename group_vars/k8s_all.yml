#=-=-=-=-=-=-=-=-=-=-=--=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=#
# ------------------------------------Overrides for K8s----------------------------------#
#=-=-=-=-=-=-=-=-=-=-=--=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=#
hardening_ip_forward: 1
hardening_rp_filter: 0                  # Must verify against CNI requirements before fleet run
hardening_firewall_enabled: false
hardening_autoupdate_apply: false
hardening_dnf_exclude: "kubelet,kubeadm,kubectl,containerd*,cri-tools"
hardening_sysctl_extra:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
